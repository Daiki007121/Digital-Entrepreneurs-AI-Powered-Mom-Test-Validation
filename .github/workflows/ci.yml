name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server dependencies
        run: cd server && pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Typecheck server
        run: cd server && pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage --coverageReporters=lcov --coverageReporters=text --coverageReporters=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Build frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: pnpm build

      - name: Build server
        run: cd server && pnpm build

      - name: Security audit (frontend)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Security audit (server)
        run: cd server && pnpm audit --audit-level=moderate
        continue-on-error: true
